version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rescuelink-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: rescuelink-redis-prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}

    volumes:
      - redis_prod_data:/data
    security_opt:
      - no-new-privileges:true

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rescuelink-server-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=15m
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - ABDM_CLIENT_ID=${ABDM_CLIENT_ID}
      - ABDM_CLIENT_SECRET=${ABDM_CLIENT_SECRET}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM}
      - DAILY_CO_API_KEY=${DAILY_CO_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    security_opt:
      - no-new-privileges:true

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: rescuelink-client-prod
    restart: unless-stopped
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - server
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_prod_data:
  redis_prod_data:
