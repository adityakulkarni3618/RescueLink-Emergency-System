name: RescueLink CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: server/package-lock.json

    - name: Install Backend Dependencies
      run: |
        cd server
        npm ci

    - name: Run Backend Tests
      run: |
        cd server
        npm test
      env:
        NODE_ENV: test
        JWT_SECRET: test_secret_for_rescuelink_jest_tests_32_chars
        ENCRYPTION_KEY: 2b7e151628aed2a6abf7158809cf4f3c2b7e151628aed2a6abf7158809cf4f3c

  build-containers:
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Server Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile
        push: false
        tags: rescuelink-server:latest

    - name: Build Client Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile.client
        push: false
        tags: rescuelink-client:latest
